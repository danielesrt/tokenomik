<!DOCTYPE html>
<html lang=“tr”>
<head>
<meta charset=“UTF-8”>
<meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
<title>Tokenomik — Animasyon</title>
<link href=“https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap” rel=“stylesheet”>
<style>
  :root {
    —bg: #050508;
    —gold: #F5C542;
    —orange: #FF6B2B;
    —white: #F0EDE8;
    —dim: #8A8580;
    —card: #0D0D12;
    —border: #1E1E28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(—bg);
    font-family: ‘Syne’, sans-serif;
    color: var(—white);
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,197,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,197,66,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Noise overlay */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’/%3E%3C/svg%3E”);
    z-index: 0;
  }

  /* Glow accent */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,197,66,0.06) 0%, transparent 70%);
    top: -150px;
  }
</style>
</head>
</html>
